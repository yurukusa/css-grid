<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Grid — Visual Grid Layout Generator</title>
<meta name="description" content="Visual CSS grid generator. Define columns, rows, gaps. Place items. Copy CSS. Free.">
<meta property="og:title" content="CSS Grid — Visual Grid Layout Generator">
<meta property="og:description" content="Visual CSS grid layout generator. Define grid, place items, copy CSS. Free.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://yurukusa.github.io/css-grid/">
<meta name="twitter:card" content="summary_large_image">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#e6e6e6;min-height:100vh}
.container{max-width:960px;margin:0 auto;padding:24px 16px}
h1{font-size:1.8rem;text-align:center;margin:32px 0 8px;color:#fff}
.subtitle{text-align:center;color:#888;margin-bottom:24px;font-size:0.95rem}

.layout{display:grid;grid-template-columns:260px 1fr;gap:16px;margin-bottom:16px}
.controls{background:#161616;border:1px solid #222;border-radius:12px;padding:16px}
.ctrl-group{margin-bottom:14px}
.ctrl-group h3{font-size:0.78rem;color:#888;margin-bottom:8px;border-bottom:1px solid #222;padding-bottom:4px}
.ctrl-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.ctrl-row label{font-size:0.72rem;color:#555;min-width:80px}
.ctrl-row input,.ctrl-row select{padding:5px 8px;border-radius:6px;border:1px solid #333;background:#0a0a0a;color:#ddd;font-family:'Fira Code',monospace;font-size:0.78rem;outline:none}
.ctrl-row input:focus,.ctrl-row select:focus{border-color:#3b82f6}
.ctrl-row input[type=text]{flex:1;min-width:0}
.ctrl-row input[type=number]{width:60px;text-align:center}

.track-editor{margin-bottom:8px}
.track-list{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px}
.track-tag{background:#1a2744;color:#4da6ff;border:1px solid #2a4a7a;border-radius:4px;padding:2px 8px;font-size:0.7rem;font-family:'Fira Code',monospace;cursor:pointer;display:flex;align-items:center;gap:4px}
.track-tag:hover{background:#223355}
.track-tag .x{color:#888;font-size:0.6rem}
.track-tag .x:hover{color:#ef4444}
.add-track{display:flex;gap:4px}
.add-track input{flex:1;padding:4px 8px;border-radius:4px;border:1px solid #333;background:#0a0a0a;color:#ddd;font-size:0.72rem;font-family:'Fira Code',monospace;outline:none}
.add-track button{padding:4px 10px;border-radius:4px;border:1px solid #333;background:#161616;color:#888;font-size:0.72rem;cursor:pointer}

.preview-area{background:#0d0d0d;border:1px solid #222;border-radius:12px;padding:16px;min-height:400px;display:flex;flex-direction:column}
.preview-area h3{font-size:0.78rem;color:#888;margin-bottom:8px}
.grid-container{flex:1;border:2px dashed #333;border-radius:8px;padding:8px;min-height:300px;transition:all 0.2s}
.grid-cell{border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Fira Code',monospace;font-size:0.72rem;color:#fff;font-weight:600;min-height:40px;transition:all 0.2s}

.presets{display:flex;gap:6px;justify-content:center;margin-bottom:20px;flex-wrap:wrap}
.preset-btn{padding:4px 10px;border-radius:6px;border:1px solid #222;background:#0d0d0d;color:#555;font-size:0.72rem;cursor:pointer}
.preset-btn:hover{border-color:#3b82f6;color:#888}

.output{background:#0d0d0d;border:1px solid #222;border-radius:10px;padding:14px;cursor:pointer;margin-bottom:16px}
.output:hover{border-color:#3b82f6}
.output pre{font-family:'Fira Code',monospace;font-size:0.78rem;color:#10b981;white-space:pre-wrap}
.output .hint{font-size:0.72rem;color:#555;margin-top:6px}

.copied{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#10b981;color:#fff;padding:8px 20px;border-radius:8px;font-size:0.85rem;font-weight:600;z-index:100;animation:fadeOut 1.5s forwards}
@keyframes fadeOut{0%{opacity:1}70%{opacity:1}100%{opacity:0}}
footer{text-align:center;padding:32px 0;color:#555;font-size:0.78rem;border-top:1px solid #1a1a1a;margin-top:40px}
footer a{color:#666;text-decoration:none}
footer a:hover{color:#999}
@media(max-width:700px){.layout{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
<h1>CSS Grid</h1>
<p class="subtitle">Visual grid layout generator. Define tracks, place items, copy CSS.</p>

<div class="presets">
  <button class="preset-btn" onclick="preset(['1fr','1fr','1fr'],['auto','auto'],12,3)">3-Column</button>
  <button class="preset-btn" onclick="preset(['200px','1fr'],['auto','auto','auto'],12,6)">Sidebar</button>
  <button class="preset-btn" onclick="preset(['1fr'],['60px','1fr','40px'],12,3)">Holy Grail</button>
  <button class="preset-btn" onclick="preset(['1fr','1fr'],['1fr','1fr'],8,4)">2×2 Equal</button>
  <button class="preset-btn" onclick="preset(['repeat(4,1fr)'],['auto','auto'],10,8)">4-Column</button>
  <button class="preset-btn" onclick="preset(['1fr','2fr','1fr'],['auto'],16,3)">Asymmetric</button>
</div>

<div class="layout">
  <div class="controls">
    <div class="ctrl-group">
      <h3>Columns</h3>
      <div class="track-editor">
        <div class="track-list" id="colTags"></div>
        <div class="add-track">
          <input type="text" id="newCol" value="1fr" placeholder="e.g. 1fr, 200px">
          <button onclick="addCol()">+</button>
        </div>
      </div>
    </div>
    <div class="ctrl-group">
      <h3>Rows</h3>
      <div class="track-editor">
        <div class="track-list" id="rowTags"></div>
        <div class="add-track">
          <input type="text" id="newRow" value="auto" placeholder="e.g. auto, 100px">
          <button onclick="addRow()">+</button>
        </div>
      </div>
    </div>
    <div class="ctrl-group">
      <h3>Spacing</h3>
      <div class="ctrl-row"><label>column-gap</label><input type="number" id="colGap" value="12" min="0" max="60" onchange="update()"><span style="font-size:0.68rem;color:#555">px</span></div>
      <div class="ctrl-row"><label>row-gap</label><input type="number" id="rowGap" value="12" min="0" max="60" onchange="update()"><span style="font-size:0.68rem;color:#555">px</span></div>
    </div>
    <div class="ctrl-group">
      <h3>Alignment</h3>
      <div class="ctrl-row"><label>justify-items</label><select id="justItems" onchange="update()"><option>stretch</option><option>start</option><option>end</option><option>center</option></select></div>
      <div class="ctrl-row"><label>align-items</label><select id="alignItems" onchange="update()"><option>stretch</option><option>start</option><option>end</option><option>center</option></select></div>
    </div>
    <div class="ctrl-group">
      <h3>Items (<span id="itemCount">3</span>)</h3>
      <div class="ctrl-row">
        <button class="preset-btn" onclick="addItem()" style="flex:1;text-align:center">+ Add</button>
        <button class="preset-btn" onclick="removeItem()" style="flex:1;text-align:center">- Remove</button>
      </div>
    </div>
  </div>

  <div class="preview-area">
    <h3>Preview</h3>
    <div class="grid-container" id="gridBox"></div>
  </div>
</div>

<div class="output" onclick="copyCSS()">
  <pre id="cssOutput"></pre>
  <div class="hint">Click to copy CSS</div>
</div>
</div>

<footer>
  <a href="https://github.com/yurukusa/css-grid">GitHub</a> ·
  Part of <a href="https://yurukusa.github.io/dev-toolkit/">Dev Toolkit</a>
</footer>

<script>
const COLORS=['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#06b6d4','#84cc16','#f97316','#14b8a6','#a855f7','#e11d48'];
let cols=['1fr','1fr','1fr'];
let rows=['auto','auto'];
let itemCount=3;

function renderTags(){
  document.getElementById('colTags').innerHTML=cols.map((c,i)=>
    `<span class="track-tag" onclick="removeCol(${i})">${c} <span class="x">✕</span></span>`
  ).join('');
  document.getElementById('rowTags').innerHTML=rows.map((r,i)=>
    `<span class="track-tag" onclick="removeRow(${i})">${r} <span class="x">✕</span></span>`
  ).join('');
}

function addCol(){
  const v=document.getElementById('newCol').value.trim();
  if(!v)return;
  cols.push(v);
  renderTags();update();
}
function removeCol(i){
  if(cols.length<=1)return;
  cols.splice(i,1);
  renderTags();update();
}
function addRow(){
  const v=document.getElementById('newRow').value.trim();
  if(!v)return;
  rows.push(v);
  renderTags();update();
}
function removeRow(i){
  if(rows.length<=1)return;
  rows.splice(i,1);
  renderTags();update();
}

function addItem(){
  if(itemCount>=16)return;
  itemCount++;
  update();
}
function removeItem(){
  if(itemCount<=1)return;
  itemCount--;
  update();
}

function preset(c,r,gap,items){
  cols=[...c];rows=[...r];
  itemCount=items;
  document.getElementById('colGap').value=gap;
  document.getElementById('rowGap').value=gap;
  document.getElementById('justItems').value='stretch';
  document.getElementById('alignItems').value='stretch';
  renderTags();update();
}

function update(){
  const cg=document.getElementById('colGap').value;
  const rg=document.getElementById('rowGap').value;
  const ji=document.getElementById('justItems').value;
  const ai=document.getElementById('alignItems').value;

  const box=document.getElementById('gridBox');
  box.style.display='grid';
  box.style.gridTemplateColumns=cols.join(' ');
  box.style.gridTemplateRows=rows.join(' ');
  box.style.columnGap=cg+'px';
  box.style.rowGap=rg+'px';
  box.style.justifyItems=ji;
  box.style.alignItems=ai;

  box.innerHTML='';
  for(let i=0;i<itemCount;i++){
    const el=document.createElement('div');
    el.className='grid-cell';
    el.style.background=COLORS[i%COLORS.length];
    el.textContent=i+1;
    box.appendChild(el);
  }

  document.getElementById('itemCount').textContent=itemCount;

  // CSS output
  let css=`.container {\n  display: grid;\n  grid-template-columns: ${cols.join(' ')};\n  grid-template-rows: ${rows.join(' ')};\n`;
  if(cg===rg)css+=`  gap: ${cg}px;\n`;
  else css+=`  column-gap: ${cg}px;\n  row-gap: ${rg}px;\n`;
  if(ji!=='stretch')css+=`  justify-items: ${ji};\n`;
  if(ai!=='stretch')css+=`  align-items: ${ai};\n`;
  css+='}\n';

  document.getElementById('cssOutput').textContent=css;
}

function copyCSS(){
  navigator.clipboard.writeText(document.getElementById('cssOutput').textContent);
  const el=document.createElement('div');
  el.className='copied';el.textContent='CSS Copied!';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1600);
}

renderTags();
update();
</script>
</body>
</html>
